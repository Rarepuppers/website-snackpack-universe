<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" role="img" aria-labelledby="wc-title wc-desc">
  <title id="wc-title">SnackPack World Cup 2026 summer illustration</title>
  <desc id="wc-desc">An original illustration of a stadium with a green pitch, a soccer ball, a generic trophy, and festive confetti in cream, teal, orange, and gold.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaf3"/>
      <stop offset="0.55" stop-color="#fef3e4"/>
      <stop offset="1" stop-color="#fbe9d4"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ba86f"/>
      <stop offset="1" stop-color="#137a54"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffe6b8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffe6b8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ball" cx="36%" cy="30%" r="72%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.7" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#d9d2c6"/>
    </radialGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7d98a"/>
      <stop offset="1" stop-color="#e0a93a"/>
    </linearGradient>
    <clipPath id="frame"><rect x="0" y="0" width="760" height="480" rx="26"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="760" height="480" fill="url(#sky)"/>
    <circle cx="600" cy="150" r="190" fill="url(#sun)"/>

    <!-- confetti -->
    <g opacity="0.92">
      <rect x="78" y="40" width="16" height="9" rx="2" fill="#1f8f77" transform="rotate(-18 86 44)"/>
      <rect x="150" y="70" width="13" height="8" rx="2" fill="#de6a38" transform="rotate(22 156 74)"/>
      <rect x="250" y="36" width="15" height="9" rx="2" fill="#efb54d" transform="rotate(12 257 40)"/>
      <circle cx="330" cy="64" r="6" fill="#1f8f77"/>
      <rect x="430" y="44" width="14" height="8" rx="2" fill="#de6a38" transform="rotate(-26 437 48)"/>
      <circle cx="520" cy="74" r="6" fill="#efb54d"/>
      <rect x="600" y="40" width="15" height="9" rx="2" fill="#1f8f77" transform="rotate(16 607 44)"/>
      <circle cx="688" cy="70" r="6" fill="#de6a38"/>
      <rect x="120" y="120" width="12" height="7" rx="2" fill="#efb54d" transform="rotate(30 126 123)"/>
      <circle cx="660" cy="128" r="5" fill="#1f8f77"/>
    </g>

    <!-- stadium stands -->
    <path d="M0 250 Q380 150 760 250 L760 330 Q380 240 0 330 Z" fill="#0f5f4e"/>
    <path d="M0 250 Q380 150 760 250 L760 268 Q380 176 0 268 Z" fill="#13735f"/>
    <!-- crowd speckle -->
    <g fill="#d8efe7" opacity="0.55">
      <circle cx="70" cy="276" r="3"/><circle cx="120" cy="266" r="3"/><circle cx="170" cy="258" r="3"/>
      <circle cx="230" cy="250" r="3"/><circle cx="300" cy="243" r="3"/><circle cx="380" cy="240" r="3"/>
      <circle cx="460" cy="243" r="3"/><circle cx="540" cy="250" r="3"/><circle cx="610" cy="258" r="3"/>
      <circle cx="670" cy="267" r="3"/><circle cx="710" cy="276" r="3"/>
      <circle cx="95" cy="290" r="3"/><circle cx="200" cy="270" r="3"/><circle cx="340" cy="256" r="3"/>
      <circle cx="500" cy="262" r="3"/><circle cx="640" cy="280" r="3"/>
    </g>

    <!-- pitch -->
    <path d="M-40 480 L150 300 L610 300 L800 480 Z" fill="url(#pitch)"/>
    <g fill="none" stroke="#eafaf2" stroke-width="3" opacity="0.85" stroke-linecap="round">
      <!-- halfway line -->
      <path d="M150 300 L610 300" stroke-width="2.5"/>
      <!-- center circle (ellipse for perspective) -->
      <ellipse cx="380" cy="300" rx="70" ry="14"/>
      <!-- penalty arc near front -->
      <path d="M250 480 Q380 430 510 480"/>
      <!-- penalty box -->
      <path d="M170 480 L210 380 L550 380 L590 480"/>
    </g>
    <circle cx="380" cy="300" r="3.5" fill="#eafaf2"/>

    <!-- generic trophy -->
    <g transform="translate(96 318)">
      <rect x="6" y="92" width="44" height="10" rx="3" fill="#caa23a"/>
      <rect x="16" y="78" width="24" height="16" rx="2" fill="#d9b552"/>
      <path d="M10 8 H46 V30 Q46 60 28 70 Q10 60 10 30 Z" fill="url(#cup)"/>
      <path d="M10 14 Q-8 16 -6 34 Q-4 50 12 48" fill="none" stroke="#e0a93a" stroke-width="6"/>
      <path d="M46 14 Q64 16 62 34 Q60 50 44 48" fill="none" stroke="#e0a93a" stroke-width="6"/>
      <ellipse cx="28" cy="9" rx="18" ry="5" fill="#f7d98a"/>
    </g>

    <!-- soccer ball -->
    <g transform="translate(470 322)">
      <ellipse cx="46" cy="104" rx="50" ry="11" fill="#0c5142" opacity="0.35"/>
      <circle cx="46" cy="60" r="52" fill="url(#ball)" stroke="#cfc7b8" stroke-width="2"/>
      <g fill="#201713">
        <path d="M46 28 l16 12 -6 19 h-20 l-6 -19 z"/>
        <path d="M46 18 l-8 6 8 4 8 -4 z" opacity="0.9"/>
      </g>
      <g fill="none" stroke="#201713" stroke-width="3" opacity="0.85" stroke-linecap="round">
        <path d="M30 47 l-18 -3"/>
        <path d="M62 47 l18 -3"/>
        <path d="M36 79 l-12 16"/>
        <path d="M56 79 l12 16"/>
        <path d="M46 60 v0"/>
      </g>
      <g fill="#201713">
        <path d="M16 58 l-6 12 8 10 10 -6 -2 -14z" opacity="0.85"/>
        <path d="M76 58 l6 12 -8 10 -10 -6 2 -14z" opacity="0.85"/>
        <path d="M30 96 l8 12 16 0 8 -12 -10 -8 -12 0z" opacity="0.85"/>
      </g>
    </g>

    <!-- 2026 marker -->
    <g transform="translate(610 332)" opacity="0.95">
      <rect x="0" y="0" width="118" height="40" rx="20" fill="#fffdf8" stroke="#e7dcc8" stroke-width="1.5"/>
      <text x="59" y="27" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#137a54" letter-spacing="2">2026</text>
    </g>

    <rect x="1" y="1" width="758" height="478" rx="25" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  </g>
</svg>
