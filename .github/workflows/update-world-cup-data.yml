name: Update World Cup data

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes (the GitHub minimum) so final scores post quickly during
    # the tournament. Free-tier scheduled runs are best-effort and may be
    # delayed, and a run only commits when results actually change.
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update World Cup data JSON
        run: node scripts/update-world-cup-data.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update World Cup 2026 data"
          file_pattern: data/world-cup-2026.json
